# START BINDINGS
# sessions
# M-N                  -- new session
# M-R                  -- rename session
# M-H, M-L             -- prev/next session
# M-`                  -- last session
# M-;                  -- find session (fzf)
#
# windows
# M-n                  -- new window
# M-r                  -- rename window
# M-w                  -- kill window
# M-h, M-l             -- prev/next window
# C-M-h, C-M-l         -- move window left/right
# PRE =                -- even-vertical layout
# PRE &                -- kill window (force)
# M-,                  -- find pane (fzf)
#
# claude sessions
# M-J, M-K             -- prev/next claude session
# M-\                  -- find claude session (fzf)
# M-|                  -- claude session menu
#
# claude attention
# M-<, M->             -- prev/next attention
# M-'                  -- find attention (fzf)
# M-"                  -- attention menu
#
# pinned windows
# M-P                  -- toggle pin
# M-(, M-)             -- prev/next pinned
#
# panes
# PRE |                -- vertical split
# PRE -                -- horizontal split
# PRE h/j/k/l          -- select pane
# PRE H/J/K/L          -- swap pane
# PRE M-arrows         -- resize pane
# PRE z                -- zoom pane
# PRE x                -- kill pane
#
# copy mode
# M-p                  -- enter copy mode
# PRE p                -- paste
# v / y / r            -- select / copy / rectangle
# j/k                  -- cursor down/up
# J/K                  -- scroll down/up
# C-j, C-k             -- halfpage down/up
# END BINDINGS

# join-pane -t :window -- moves current pane to :window
# break-pane           -- makes current pane its own window
# swap-pane

# move window from one session to another:
#   move-window -s srcsess:windowname -t destsess
# if already in windowname
#   move-window -t destsess
# if already in destsess
#   movew -d srcsess:windowname

# to link a window between multiple sessions
#   link-window -d -s srcsess:windowname -t destsess:windowname

# vi binds
setw -g mode-keys vi
set -g status-keys vi

set -g set-clipboard on

setw -g aggressive-resize on

set-option -g history-limit 50000

set -sg escape-time 1     # lower delay
set -g base-index 1       # set the window start index to 1
setw -g pane-base-index 1 # set the pane start index to 1

# easier way of reloading the config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# prefix: default is C-b
set-option -g prefix C-b
bind C-b send-prefix

setw -g window-status-style bg=default,none
set -g message-style bg=default,none
setw -g window-status-format "#[default]#{?window_activity_flag,#[bg=red],#[bg=colour0]} #[bg=colour15,none,fg=default] #{window_name} "
setw -g window-status-current-format "#[fg=white,bg=colour2] #[bg=colour15,none,fg=default,bold] #{window_name} "

# prompts
set -g status 3
set -g status-interval 1
set -g status-position top
set -g status-justify left
set -g status-style bg=default,none

set -g status-right-style bg=default,none
set -g status-right-length 0
set -g status-right "#{S/n:#{W:#{P:#{?#{@claude_attention},#[range=user|p:#{pane_id}]#[#{?#{&&:#{session_attached},#{window_active}},bg=colour2,#{?#{==:#{@claude_attention},blocked},bg=red,#{?#{==:#{@claude_attention},busy},bg=yellow,#{?#{||:#{==:#{@claude_attention},idle},#{==:#{@claude_attention},done}},bg=blue,bg=colour0}}}}] #[#{?#{&&:#{session_attached},#{window_active}},bg=colour15 none fg=default bold,bg=colour15 none fg=default}] #{window_name} #[norange]#[default] ,}}}}"

set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{window-status-separator},#[range=window|#{window_index} list=focus #{E:window-status-current-style}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{window-status-separator}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T:status-right}#[pop-default]#[norange default]"
set -g status-format[1] ""
set -g status-format[2] "#[align=left] #{S/n:#[default]#[range=session|#{session_id}]#[bg=colour0] #[bg=colour15 none fg=default] #{session_name} #[norange]#[default] ,#[range=session|#{session_id}]#[fg=white bg=magenta] #[bg=colour15 none fg=default bold] #{session_name} #[norange]#[default] }#[align=right]#{S:#{W:#{?#{@is_pinned},#[range=user|w:#{window_id}]#[#{?#{&&:#{session_attached},#{window_active}},fg=black bg=yellow,bg=colour0}] #[#{?#{&&:#{session_attached},#{window_active}},bg=colour15 none fg=default bold,bg=colour15 none fg=default}] #{window_name} #[norange]#[default] ,}}}"

set -g status-left-length 0
set -g status-left " "

# no spaces in between components
setw -g window-status-separator " "

set -g allow-passthrough all

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# TODO: show when it's active with diff color
setw -g window-status-current-style fg=default,bold
setw -g window-status-activity-style bg=red

set -g monitor-activity on
set -g activity-action other
set -g bell-action other

# attaching from multiple terminals to the same session seems to freeze when we have this
# set -g pane-scrollbars on
# set -g pane-border-style fg=colour6
# set -g pane-active-border-style fg=colour6

# Ps = 6 for document, 7 for working directory
# ESC ] Ps ; Pt BEL
# Pt = file: url-encoded URI

set-option -g set-titles on
set-option -g set-titles-string "#S:#W · #{s|#{HOME}|~|:#{pane_current_path}} · #{pane_current_command}"

bind -n M-: command-prompt

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r H swap-pane -s '{left-of}'
bind -r J swap-pane -s '{down-of}'
bind -r K swap-pane -s '{up-of}'
bind -r L swap-pane -s '{right-of}'

set-option -g mouse on

bind-key -r -T prefix M-Up resize-pane -U 1
bind-key -r -T prefix M-Down resize-pane -D 1
bind-key -r -T prefix M-Left resize-pane -L 1
bind-key -r -T prefix M-Right resize-pane -R 1

# go back to the previously used window
bind-key C-l last-window

# switch between windows left/right
bind -n M-h previous-window
bind -n M-l next-window

bind-key = select-layout even-vertical

# switch between sessions
bind -n M-H switch-client -p
bind -n M-L switch-client -n
bind -n 'M-`' switch-client -l

# pinned windows
bind -n M-P run-shell '~/.tmux/scripts/pinned.sh toggle'
bind -n 'M-(' run-shell '~/.tmux/scripts/pinned.sh prev'
bind -n 'M-)' run-shell '~/.tmux/scripts/pinned.sh next'

# claude sessions
bind -n 'M-J' run-shell '~/.tmux/scripts/claude-attention.sh all-prev'
bind -n 'M-K' run-shell '~/.tmux/scripts/claude-attention.sh all-next'
bind -n 'M-\' display-popup -w 100% -h 80% -x 0 -y 100% -E '~/.tmux/scripts/claude-attention.sh all-select'
bind -n 'M-|' run-shell '~/.tmux/scripts/claude-attention.sh all-menu'

# claude attention
bind -n 'M-<' run-shell '~/.tmux/scripts/claude-attention.sh prev'
bind -n 'M->' run-shell '~/.tmux/scripts/claude-attention.sh next'
bind -n "M-'" display-popup -w 100% -h 80% -x 0 -y 100% -E '~/.tmux/scripts/claude-attention.sh select'
bind -n 'M-"' run-shell '~/.tmux/scripts/claude-attention.sh menu'
bind -n MouseDown1Status if -F '#{||:#{m:p:*,#{mouse_status_range}},#{m:w:*,#{mouse_status_range}}}' \
    'run-shell "~/.tmux/scripts/click.sh #{mouse_status_range}"' \
    'switch-client -t ='

# move windows left/right
bind -n C-M-h swap-window -d -t -
bind -n C-M-l swap-window -d -t +

# kill window with confirmation
bind -n M-w display-menu -T "Kill window #W?" \
  "Yes" y "kill-window" \
  "No"  n ""

# create window with name
bind -n M-r command-prompt -I "#W" 'rename-window "%%"'
bind -n M-n command-prompt -I "zsh" -p "Name of new window:" 'new-window -a -c "#{pane_current_path}" -n "%%"'

# create new session
bind -n M-R command-prompt "rename-session '%%'"
bind -n M-N command-prompt -p "Name of new session:" 'new-session -c "#{pane_current_path}" -s "%%"'

# jump to any window in any session
# TODO: use zsh --rcs?
# https://unix.stackexchange.com/questions/152738/how-to-split-a-new-window-and-run-a-command-in-this-new-window-using-tmux
bind -n 'M-,' display-popup -w 100% -h 80% -x 0 -y 100% -E "TMUX_FZF=1 zsh -ci _fzf-tmux-switch-panes"
bind -n 'M-;' display-popup -w 100% -h 80% -x 0 -y 100% -E "TMUX_FZF=1 zsh -ci _fzf-tmux-switch-sessions"

# help
bind -n 'M-?' display-popup -w 60 -h 80% -E '~/.tmux/scripts/help.sh'

# copy mode
bind -n M-p copy-mode
bind p paste-buffer

bind -Tcopy-mode-vi 'v' send -X begin-selection
bind -Tcopy-mode-vi 'y' send -X copy-selection
bind -Tcopy-mode-vi 'r' send -X rectangle-toggle
bind -Tcopy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

bind -Tcopy-mode-vi 'j' send -X cursor-down
bind -Tcopy-mode-vi 'k' send -X cursor-up
bind -Tcopy-mode-vi 'J' send -X scroll-down
bind -Tcopy-mode-vi 'K' send -X scroll-up

bind-key -Tcopy-mode-vi C-k send-keys -X halfpage-up
bind-key -Tcopy-mode-vi C-j send-keys -X halfpage-down

# bind C-p run "tmux set-buffer \"$(xsel -o -b)\"; tmux paste-buffer"
# bind C-y run "tmux save-buffer - | xsel -i -b"

# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @yank_selection_mouse 'clipboard'
set -g @plugin 'tmux-plugins/tmux-yank'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run -b '~/.tmux/plugins/tpm/tpm'
